# Containerized, production-like stack: MongoDB + API + static client.
# For fast hot-reload local dev, prefer `npm run dev` (or `dev:memdb`) instead.
#
#   docker compose up --build
#   → client at http://localhost:8080, API at http://localhost:4000
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand({ ping: 1 })']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '4000'
      MONGODB_URI: mongodb://mongo:27017/blind-tasting
      CLIENT_ORIGIN: http://localhost:8080
    ports:
      - '4000:4000'
    depends_on:
      mongo:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        VITE_API_URL: http://localhost:4000
        VITE_SOCKET_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  mongo-data:
